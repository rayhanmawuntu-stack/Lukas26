name: Apply runtime audit repair

on:
  push:
    paths:
      - .github/workflows/apply-runtime-audit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch current app safely
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()

          s = s.replace('width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover',
                        'width=device-width,initial-scale=1,viewport-fit=cover')

          s = re.sub(r"<style id=['\"]final-audit-fixes['\"]>.*?</style>", '', s, flags=re.S)
          s = re.sub(r"<script id=['\"]final-audit-fixes['\"]>.*?</script>", '', s, flags=re.S)

          css = r"""
          <style id='final-audit-fixes'>
          :root{--app-h:100svh}
          .app{height:min(var(--app-h),760px)!important}
          .screen{overscroll-behavior:contain}
          .wish-panel{overflow:auto;-webkit-overflow-scrolling:touch}
          .wish-card{max-height:calc(var(--app-h) - var(--st) - var(--sb) - 30px);overflow:auto;-webkit-overflow-scrolling:touch}
          .wish-input,video{touch-action:auto}
          .hint{min-height:16px}
          .video-play{display:block;min-width:190px;min-height:48px;margin:12px auto 0;border:1px solid #222;border-radius:999px;padding:11px 18px;background:#333;color:#fff;font-weight:800}
          .video-play[hidden]{display:none}
          @media(max-width:430px){.app{height:var(--app-h)!important}.wish-card{max-height:calc(var(--app-h) - var(--st) - var(--sb) - 20px)}}
          @media(max-height:620px){.screen{place-items:start center;overflow:auto}.cake-scene{min-height:0;padding:8px 0 18px}.cake-scene h2{font-size:clamp(27px,7vw,38px);margin-bottom:3px}.cake-target{height:190px;transform:scale(.78);transform-origin:center bottom;margin-top:-18px;margin-bottom:-15px}.cake-instruction{margin:0 0 7px}.cake-controls{gap:6px}.music,.blow{min-height:44px;padding:9px 14px}.wish-panel{align-items:start}.wish-card{margin:auto 0;padding:18px 16px}.wish-card h3{font-size:30px}.pre-video-card{margin:auto}.card{margin:auto 0}.card h2{font-size:30px}video{max-height:39vh}.letter-actions{bottom:2px}}
          </style>
          """
          s = s.replace('</head>', css + '</head>', 1)

          s = re.sub(
              r"<input class='wish-input' id='wishInput'[^>]*>",
              "<input class='wish-input' id='wishInput' type='text' maxlength='120' autocomplete='off' autocapitalize='sentences' spellcheck='true' inputmode='text' enterkeyhint='send' placeholder='I wish...' aria-label='Birthday wish'>",
              s,
              count=1,
          )

          s = re.sub(
              r"<article class='letter-paper'>.*?</article>",
              "<article class='letter-paper'><p>Happy birthday sayang, semoga di usia ke 26 ini banyak hal baik yang akan terjadi ke kamu. Semoga kamu menjadi orang yang lebih baik lagi, mimpi kamu banyak yang terwujud, dan banyak kesempatan baru yg terbuka buat kamu.</p><p>Sayang, tetap jadi orang favoritku ya.</p><p class='signature'>With love,<br>Rayhan</p></article>",
              s,
              count=1,
              flags=re.S,
          )

          if "id='videoPlay'" not in s:
              s = re.sub(
                  r"(<video id='video'[^>]*>.*?</video>)",
                  r"\1<button class='video-play' id='videoPlay' type='button' hidden>TAP TO PLAY VIDEO</button>",
                  s,
                  count=1,
                  flags=re.S,
              )
          if "id='videoStatus'" not in s:
              s = s.replace("<div class='hint'>", "<div class='hint' id='videoStatus' role='status' aria-live='polite'>", 1)

          s = s.replace('buildMusic();resize();makeClouds();reset();', 'resize();makeClouds();reset();')

          old_key = "addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='ArrowUp')jump(e)});"
          new_key = "function editableTarget(t){return t&&(t.isContentEditable||/^(INPUT|TEXTAREA|SELECT)$/.test(t.tagName))}addEventListener('keydown',e=>{if(editableTarget(e.target)||e.repeat)return;if(e.code==='Space'||e.code==='ArrowUp')jump(e)});"
          s = s.replace(old_key, new_key)

          audit_js = r"""
          <script id='final-audit-fixes'>
          (()=>{
            const nativeSetTimeout=window.setTimeout.bind(window),nativeClearTimeout=window.clearTimeout.bind(window),flowTimers=new Set();
            window.setTimeout=(fn,ms,...args)=>{const id=nativeSetTimeout(()=>{flowTimers.delete(id);typeof fn==='function'?fn(...args):Function(fn)()},ms);flowTimers.add(id);return id};
            window.clearTimeout=id=>{flowTimers.delete(id);return nativeClearTimeout(id)};
            const clearFlowTimers=()=>{flowTimers.forEach(nativeClearTimeout);flowTimers.clear()};

            function syncViewport(){const h=Math.round(window.visualViewport?.height||window.innerHeight||document.documentElement.clientHeight);document.documentElement.style.setProperty('--app-h',Math.max(320,h)+'px')}
            const originalResize=resize;
            resize=function(){syncViewport();originalResize()};
            const auditedResize=()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{resize();makeClouds();draw()},80)};
            addEventListener('resize',auditedResize,{passive:true});
            addEventListener('orientationchange',auditedResize,{passive:true});
            window.visualViewport?.addEventListener('resize',auditedResize,{passive:true});
            syncViewport();resize();draw();

            const oldMusic=document.getElementById('music');
            if(oldMusic){const fresh=oldMusic.cloneNode(true);oldMusic.replaceWith(fresh);fresh.addEventListener('click',()=>{if(musicOn){musicOn=false;stopMusic();fresh.setAttribute('aria-pressed','false');fresh.textContent='♫ MUSIC BOX OFF'}else{musicOn=true;fresh.setAttribute('aria-pressed','true');fresh.textContent='♫ MUSIC BOX ON';unlockMusic();setTimeout(startMusic,120)}})}

            const playButton=document.getElementById('videoPlay'),status=document.getElementById('videoStatus');
            function safePlay(){playButton.hidden=true;if(status)status.textContent='Loading your birthday video...';const result=video.play();if(result&&result.then)result.then(()=>{if(status)status.textContent=''}).catch(()=>{playButton.hidden=false;if(status)status.textContent='Tap the button to start the video, or use the direct link below.'})}
            showVideo=function(){stopMusic();cakeScreen.classList.remove('show');cakeScreen.setAttribute('aria-hidden','true');preVideoScreen.classList.remove('show');preVideoScreen.setAttribute('aria-hidden','true');videoScreen.classList.add('show');videoScreen.setAttribute('aria-hidden','false');burst();safePlay()};
            playButton?.addEventListener('click',safePlay);
            video.addEventListener('loadeddata',()=>{playButton.hidden=true;if(status)status.textContent=''});
            video.addEventListener('playing',()=>{playButton.hidden=true;if(status)status.textContent=''});
            video.addEventListener('error',()=>{playButton.hidden=false;if(status)status.textContent='This browser cannot play the 3GP file. Use the direct link below.'});

            showWish=function(){wishPanel.classList.add('show');wishPanel.setAttribute('aria-hidden','false');if(!matchMedia('(pointer:coarse)').matches)setTimeout(()=>wishInput.focus(),180)};
            wishSend.addEventListener('click',()=>wishInput.blur(),true);
            wishInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing)wishInput.blur()},true);
            replay.addEventListener('click',clearFlowTimers,true);
            jumpBtn.addEventListener('click',e=>{if(e.detail===0)jump(e)});

            document.addEventListener('visibilitychange',()=>{if(document.hidden)stopMusic();else if(cakeScreen.classList.contains('show')&&!candleBlown&&musicOn)startMusic()});
            addEventListener('pagehide',()=>{clearFlowTimers();stopMusic();if(musicUrl)URL.revokeObjectURL(musicUrl)},{once:true});
          })();
          </script>
          """
          s = s.replace('</body>', audit_js + '</body>', 1)

          p.write_text(s)
          PY

      - name: Validate repaired app
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          from collections import Counter
          s=Path('index.html').read_text()
          required=['Happy birthday sayang','function editableTarget',"id='videoPlay'",'--app-h',"id='final-audit-fixes'"]
          missing=[x for x in required if x not in s]
          if missing: raise SystemExit(f'Missing markers: {missing!r}')
          ids=re.findall(r"\bid=['\"]([^'\"]+)['\"]",s)
          dup=[k for k,v in Counter(ids).items() if v>1]
          if dup: raise SystemExit(f'Duplicate IDs: {dup!r}')
          scripts=re.findall(r'<script(?: [^>]*)?>(.*?)</script>',s,re.S)
          if len(scripts)<2: raise SystemExit('Audit script missing')
          for i,js in enumerate(scripts): Path(f'/tmp/app-{i}.js').write_text(js)
          print('Static validation passed')
          PY
          for f in /tmp/app-*.js; do node --check "$f"; done

      - name: Commit and clean temporary files
        run: |
          rm -f .github/audit_payload_1.txt .github/audit_payload_2.txt .github/audit_payload_3.txt .github/audit_payload_4.txt .github/audit_payload_5.txt
          rm -f .github/workflows/apply-final-audit.yml .github/workflows/apply-runtime-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github
          git commit -m "Repair bugs and optimize phone experience"
          git push
