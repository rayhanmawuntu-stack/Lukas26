      - name: Validate JavaScript
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          source = Path('index.html').read_text()
          match = re.search(r'<script>(.*)</script>', source, re.S)
          if not match:
              raise SystemExit('No script block found')
          Path('/tmp/lukas26.js').write_text(match.group(1))
          PY
          node --check /tmp/lukas26.js
      - name: Commit feature flow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git commit -m "Add hidden messages, birthday wish, and letter"
          git push
