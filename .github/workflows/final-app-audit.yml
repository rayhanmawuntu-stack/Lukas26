name: Final app audit and phone optimization

on:
  push:
    paths:
      - .github/workflows/final-app-audit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write audited app
        shell: bash
        run: |
          cat > /tmp/app.html.gz.b64 <<'PAYLOAD'
  
PAYLOAD
          base64 -d /tmp/app.html.gz.b64 | gzip -d > index.html
      - name: Validate app
        run: |
          python3 <<'PYV'
          from pathlib import Path
          import re
          from collections import Counter
          s=Path('index.html').read_text()
          required=[
            "Happy birthday sayang",
            "function editableTarget",
            "preVideoScreen=$('preVideoScreen')",
            "id='videoPlay'",
            "--app-h",
            "musicBtn.addEventListener('click',toggleMusic)",
          ]
          missing=[x for x in required if x not in s]
          if missing: raise SystemExit('Missing required markers: '+repr(missing))
          ids=re.findall(r"\bid=['\"]([^'\"]+)['\"]",s)
          dup=[k for k,v in Counter(ids).items() if v>1]
          if dup: raise SystemExit('Duplicate IDs: '+repr(dup))
          js=re.search(r'<script>(.*)</script>',s,re.S)
          if not js: raise SystemExit('No script block')
          Path('/tmp/app.js').write_text(js.group(1))
          refs=set(re.findall(r"\$\('([^']+)'\)",js.group(1)))
          absent=sorted(refs-set(ids))
          if absent: raise SystemExit('Missing DOM IDs: '+repr(absent))
          print('Static checks passed')
          PYV
          node --check /tmp/app.js
      - name: Commit audited build
        run: |
          rm .github/workflows/final-app-audit.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/final-app-audit.yml
          git commit -m "Audit app and optimize phone experience"
          git push
