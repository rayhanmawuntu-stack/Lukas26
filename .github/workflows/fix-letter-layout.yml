name: Fix letter layout

on:
  push:
    paths:
      - .github/workflows/fix-letter-layout.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Repair opened letter layout
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text()

          if "top:calc(100% - 280px)" in s and "bottom:108px;height:min(520px" in s:
              print('Letter layout already fixed.')
              raise SystemExit(0)

          new_css = ".letter-open{display:block;min-width:190px;margin:12px auto 0;border:1px solid #222;border-radius:999px;padding:11px 18px;background:#ededed;color:#333;font-weight:800}.letter-screen{z-index:30;overflow:hidden;background:radial-gradient(circle at 50% 18%,#fff,transparent 31%),linear-gradient(145deg,#e7e7e7,#a9a9a9)}.letter-wrap{position:relative;width:min(560px,100%);height:100%;min-height:0;text-align:center}.letter-kicker{position:absolute;left:0;right:0;top:2px;margin:0;color:#555;font-size:12px;font-weight:800;letter-spacing:.15em;text-transform:uppercase;transition:opacity .25s}.letter-wrap:has(.envelope.open) .letter-kicker{opacity:0}.envelope{position:absolute;left:50%;top:50%;width:min(350px,88vw);height:220px;margin:0;transform:translate(-50%,-50%);perspective:1200px;transition:top .78s ease,transform .78s ease}.envelope-back{position:absolute;inset:28px 0 0;border:2px solid #444;border-radius:9px;background:#cfcfcf;box-shadow:0 20px 45px #0004}.envelope-front{position:absolute;inset:29px 1px 1px;z-index:4;overflow:hidden;border-radius:8px;clip-path:polygon(0 36%,50% 76%,100% 36%,100% 100%,0 100%);background:linear-gradient(145deg,#e6e6e6,#bcbcbc);border-bottom:2px solid #444}.envelope-flap{position:absolute;left:1px;right:1px;top:29px;z-index:5;height:108px;transform-origin:50% 0;clip-path:polygon(0 0,100% 0,50% 100%);background:#dedede;border-top:2px solid #444;transition:transform .8s ease,z-index .1s .38s}.letter-paper{position:absolute;left:14px;right:14px;bottom:12px;z-index:3;height:168px;overflow:auto;-webkit-overflow-scrolling:touch;border:1px solid #aaa;border-radius:9px;padding:20px 20px 24px;background:#fff;color:#333;box-shadow:0 8px 20px #0002;text-align:left;font-size:15px;line-height:1.5;transform:translateY(0);transition:bottom .88s ease,height .88s ease,transform .88s ease,padding .3s ease}.letter-paper p{margin:0 0 12px}.letter-paper .signature{margin-top:18px;font-weight:800}.envelope.open{top:calc(100% - 280px);transform:translateX(-50%)}.envelope.open .envelope-flap{z-index:1;transform:rotateX(180deg)}.envelope.open .letter-paper{z-index:6;bottom:108px;height:min(520px,calc(100vh - 240px));padding:24px 23px 30px;transform:none;box-shadow:0 18px 48px #0004}.letter-actions{position:absolute;left:0;right:0;bottom:0;z-index:10;display:flex;flex-wrap:wrap;justify-content:center;gap:9px}.letter-actions button{min-height:48px;border:1px solid #222;border-radius:999px;padding:11px 19px;font-weight:800}.letter-reveal{background:#333;color:#fff}.letter-close{background:#ededed;color:#333}@supports(height:100svh){.envelope.open .letter-paper{height:min(520px,calc(100svh - 240px))}}@media(max-width:430px){.message-toast{top:calc(var(--st) + 52px);font-size:12px}.wish-card{padding:24px 16px}.letter-screen{padding-left:calc(var(--sl) + 10px);padding-right:calc(var(--sr) + 10px)}.letter-kicker{top:0}.envelope{width:min(338px,91vw)}.letter-paper{left:11px;right:11px;font-size:14px;padding:18px 17px 22px}.envelope.open .letter-paper{padding:21px 18px 27px}.letter-actions button{min-height:46px;padding:10px 16px}}"

          patched, count = re.subn(r"\.letter-open\{.*?(?=\.pre-video-screen)", new_css, s, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Could not locate letter CSS block')

          p.write_text(patched)
          PY

      - name: Validate JavaScript
        run: |
          python3 <<'PY'
          import re
          from pathlib import Path
          s = Path('index.html').read_text()
          js = re.search(r'<script>(.*)</script>', s, re.S).group(1)
          Path('/tmp/index.js').write_text(js)
          PY
          node --check /tmp/index.js

      - name: Commit corrected letter layout
        run: |
          if git diff --quiet; then
            echo "No changes needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix opened letter layout"
          git push
