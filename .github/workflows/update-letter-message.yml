name: Update birthday letter

on:
  push:
    paths:
      - .github/workflows/update-letter-message.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-letter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace letter message
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text()
          replacement = "<article class='letter-paper'><p>Happy birthday sayang, semoga di usia ke 26 ini banyak hal baik yang akan terjadi ke kamu. Semoga kamu menjadi orang yang lebih baik lagi, mimpi kamu banyak yang terwujud, dan banyak kesempatan baru yg terbuka buat kamu.</p><p>Sayang, tetap jadi orang favoritku ya.</p><p class='signature'>With love,<br>Rayhan</p></article>"
          pattern = r"<article class='letter-paper'>.*?</article>"
          updated, count = re.subn(pattern, replacement, html, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Could not find the letter body.')
          path.write_text(updated)
          PY

      - name: Verify replacement
        run: |
          grep -F "Sayang, tetap jadi orang favoritku ya." index.html
          grep -F "With love,<br>Rayhan" index.html

      - name: Commit updated letter
        run: |
          if git diff --quiet; then
            echo "Letter already updated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update birthday letter message"
          git push
