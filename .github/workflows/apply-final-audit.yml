name: Apply final audited app

on:
  push:
    paths:
      - .github/workflows/apply-final-audit.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild audited app
        run: |
          cat .github/audit_payload_1.txt \
              .github/audit_payload_2.txt \
              .github/audit_payload_3.txt \
              .github/audit_payload_4.txt \
              .github/audit_payload_5.txt \
            | tr -d '\n\r ' \
            | base64 -d \
            | gzip -d > index.html

      - name: Validate app
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re
          from collections import Counter

          s = Path('index.html').read_text()
          required = [
              'Happy birthday sayang',
              'function editableTarget',
              "preVideoScreen=$('preVideoScreen')",
              "id='videoPlay'",
              '--app-h',
              "musicBtn.addEventListener('click',toggleMusic)",
          ]
          missing = [x for x in required if x not in s]
          if missing:
              raise SystemExit(f'Missing required markers: {missing!r}')

          ids = re.findall(r"\bid=['\"]([^'\"]+)['\"]", s)
          duplicates = [k for k, v in Counter(ids).items() if v > 1]
          if duplicates:
              raise SystemExit(f'Duplicate IDs: {duplicates!r}')

          match = re.search(r'<script>(.*)</script>', s, re.S)
          if not match:
              raise SystemExit('No script block')
          js = match.group(1)
          Path('/tmp/app.js').write_text(js)

          refs = set(re.findall(r"\$\('([^']+)'\)", js))
          absent = sorted(refs - set(ids))
          if absent:
              raise SystemExit(f'Missing DOM IDs: {absent!r}')

          print('Static checks passed')
          PY
          node --check /tmp/app.js

      - name: Commit audited build
        run: |
          rm .github/audit_payload_1.txt \
             .github/audit_payload_2.txt \
             .github/audit_payload_3.txt \
             .github/audit_payload_4.txt \
             .github/audit_payload_5.txt \
             .github/workflows/apply-final-audit.yml

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github
          git commit -m "Audit app and optimize phone experience"
          git push
