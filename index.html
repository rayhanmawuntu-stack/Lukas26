<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Birthday Dino Surprise</title>
  <style>
    :root {
      --ink: #535353;
      --paper: #f7f7f7;
      --accent: #ff5d8f;
      --accent-dark: #e43f75;
      --gold: #ffc857;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--paper);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
    }

    body {
      min-height: 100dvh;
      display: grid;
      place-items: center;
    }

    .app {
      position: relative;
      width: min(100vw, 1200px);
      height: min(100dvh, 760px);
      overflow: hidden;
      background:
        radial-gradient(circle at 80% 18%, rgba(255,255,255,.95), transparent 28%),
        linear-gradient(#fbfbfb, #f3f3f3);
    }

    .topbar {
      position: absolute;
      inset: 0 0 auto 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px clamp(18px, 4vw, 42px);
      font-size: 14px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .brand {
      font-weight: 800;
    }

    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .stage {
      position: absolute;
      inset: 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .intro {
      position: absolute;
      left: 50%;
      top: 28%;
      width: min(88%, 640px);
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      z-index: 4;
      transition: opacity .35s ease, transform .35s ease;
    }

    .intro.hidden {
      opacity: 0;
      transform: translate(-50%, -62%);
    }

    .intro h1 {
      margin: 0 0 10px;
      color: #3f3f3f;
      font-size: clamp(30px, 6vw, 64px);
      line-height: .95;
      letter-spacing: -.04em;
    }

    .intro p {
      margin: 0;
      font-size: clamp(14px, 2vw, 18px);
      line-height: 1.5;
    }

    .kbd {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      padding: 3px 8px;
      border: 1px solid #aaa;
      border-bottom-width: 3px;
      border-radius: 5px;
      background: white;
      font-weight: 700;
      font-size: .85em;
    }

    .mobile-jump {
      position: absolute;
      z-index: 6;
      left: 50%;
      bottom: max(22px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(72vw, 320px);
      border: 0;
      border-radius: 999px;
      padding: 15px 20px;
      background: #4a4a4a;
      color: white;
      font-weight: 800;
      letter-spacing: .05em;
      box-shadow: 0 10px 26px rgba(0,0,0,.14);
      cursor: pointer;
    }

    @media (min-width: 800px) {
      .mobile-jump { display: none; }
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 20px;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,255,255,.22), transparent 24%),
        linear-gradient(135deg, rgba(255,93,143,.97), rgba(116,80,190,.97));
      opacity: 0;
      pointer-events: none;
      transform: scale(1.03);
      transition: opacity .55s ease, transform .55s ease;
    }

    .video-overlay.show {
      opacity: 1;
      pointer-events: auto;
      transform: scale(1);
    }

    .video-card {
      width: min(930px, 96vw);
      max-height: 92dvh;
      overflow: auto;
      border-radius: 28px;
      padding: clamp(18px, 3vw, 30px);
      background: rgba(255,255,255,.96);
      box-shadow: 0 28px 80px rgba(0,0,0,.28);
      text-align: center;
    }

    .video-card h2 {
      margin: 4px 0 8px;
      color: #313131;
      font-size: clamp(30px, 5vw, 58px);
      letter-spacing: -.04em;
    }

    .video-card p {
      margin: 0 0 18px;
      color: #666;
    }

    video {
      width: 100%;
      max-height: 58dvh;
      border-radius: 18px;
      background: #111;
      box-shadow: 0 14px 40px rgba(0,0,0,.18);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 16px;
    }

    .actions button,
    .actions label {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      cursor: pointer;
      transition: transform .16s ease, filter .16s ease;
    }

    .actions button:hover,
    .actions label:hover {
      transform: translateY(-1px);
      filter: brightness(.98);
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .secondary {
      background: #ececec;
      color: #444;
    }

    #videoPicker { display: none; }

    .confetti {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 10px;
      height: 18px;
      border-radius: 2px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to {
        transform: translate3d(var(--drift), 110dvh, 0) rotate(var(--spin));
      }
    }

    .hint {
      opacity: .78;
      font-size: 12px;
      margin-top: 10px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <main class="app" aria-label="Birthday dinosaur game">
    <div class="topbar">
      <div class="brand">Birthday Run</div>
      <div class="score" id="score">00000</div>
    </div>

    <section class="stage">
      <canvas id="game" aria-label="Dinosaur jumping game"></canvas>

      <div class="intro" id="intro">
        <h1>Run to the surprise.</h1>
        <p>
          Press <span class="kbd">Space</span>, <span class="kbd">↑</span>, or tap to jump.
          Reach the gift box to unlock the birthday message.
        </p>
      </div>

      <button class="mobile-jump" id="jumpButton" type="button">TAP TO JUMP</button>
    </section>

    <section class="video-overlay" id="videoOverlay" aria-hidden="true">
      <div class="confetti" id="confetti"></div>

      <div class="video-card">
        <h2 id="birthdayTitle">Happy Birthday! 🎉</h2>
        <p id="birthdayMessage">A little surprise made especially for you.</p>

        <video id="birthdayVideo" controls playsinline preload="metadata">
          <source
            src="https://interactive-examples.mdn.mozilla.net/media/cc0-videos/flower.mp4"
            type="video/mp4"
          />
          Your browser does not support HTML video.
        </video>

        <div class="actions">
          <button class="primary" id="playAgain" type="button">Play again</button>
          <label class="secondary" for="videoPicker">Choose another video</label>
          <input id="videoPicker" type="file" accept="video/*" />
        </div>

        <div class="hint">
          To permanently use your own video, replace the video URL in the HTML file.
        </div>
      </div>
    </section>
  </main>

  <script>
    const CONFIG = {
      birthdayTitle: "Happy Birthday! 🎉",
      birthdayMessage: "A little surprise made especially for you.",
      giftAppearsAfterSeconds: 8
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const app = document.querySelector(".app");
    const scoreEl = document.getElementById("score");
    const intro = document.getElementById("intro");
    const jumpButton = document.getElementById("jumpButton");
    const overlay = document.getElementById("videoOverlay");
    const video = document.getElementById("birthdayVideo");
    const playAgain = document.getElementById("playAgain");
    const videoPicker = document.getElementById("videoPicker");
    const confetti = document.getElementById("confetti");

    document.getElementById("birthdayTitle").textContent = CONFIG.birthdayTitle;
    document.getElementById("birthdayMessage").textContent = CONFIG.birthdayMessage;

    let DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0;
    let H = 0;
    let groundY = 0;
    let running = false;
    let revealed = false;
    let startTime = 0;
    let lastTime = 0;
    let score = 0;
    let gameSpeed = 420;
    let distance = 0;

    const dino = {
      x: 92,
      y: 0,
      w: 52,
      h: 58,
      vy: 0,
      grounded: true,
      legPhase: 0
    };

    let obstacles = [];
    let clouds = [];
    let gift = null;
    let nextObstacleAt = 0;

    function resize() {
      const rect = app.getBoundingClientRect();
      W = rect.width;
      H = rect.height;
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = `${W}px`;
      canvas.style.height = `${H}px`;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      groundY = H * 0.76;
      dino.y = Math.min(dino.y || groundY - dino.h, groundY - dino.h);
    }

    function resetGame() {
      running = false;
      revealed = false;
      startTime = 0;
      lastTime = 0;
      score = 0;
      distance = 0;
      gameSpeed = 420;
      obstacles = [];
      gift = null;
      nextObstacleAt = 0;
      dino.y = groundY - dino.h;
      dino.vy = 0;
      dino.grounded = true;
      intro.classList.remove("hidden");
      scoreEl.textContent = "00000";
      overlay.classList.remove("show");
      overlay.setAttribute("aria-hidden", "true");
      video.pause();
      destroyConfetti();
      draw(0);
    }

    function startGame() {
      if (revealed) return;
      if (!running) {
        running = true;
        startTime = performance.now();
        lastTime = startTime;
        nextObstacleAt = 1.3;
        intro.classList.add("hidden");
        requestAnimationFrame(loop);
      }
    }

    function jump() {
      if (revealed) return;
      startGame();
      if (dino.grounded) {
        dino.vy = -900;
        dino.grounded = false;
      }
    }

    function spawnObstacle() {
      const tall = Math.random() > 0.55;
      const w = tall ? 28 : 42;
      const h = tall ? 62 : 42;
      obstacles.push({
        x: W + 40,
        y: groundY - h,
        w,
        h,
        type: tall ? "cactus" : "rock"
      });
    }

    function spawnGift() {
      gift = {
        x: W + 70,
        y: groundY - 58,
        w: 58,
        h: 58
      };
    }

    function createClouds() {
      clouds = Array.from({ length: 5 }, (_, i) => ({
        x: (W / 5) * i + Math.random() * 120,
        y: 90 + Math.random() * (H * 0.25),
        size: 0.65 + Math.random() * 0.7,
        speed: 12 + Math.random() * 12
      }));
    }

    function intersects(a, b, padding = 8) {
      return (
        a.x + padding < b.x + b.w &&
        a.x + a.w - padding > b.x &&
        a.y + padding < b.y + b.h &&
        a.y + a.h - padding > b.y
      );
    }

    function update(dt, now) {
      const seconds = (now - startTime) / 1000;
      gameSpeed = Math.min(650, 420 + seconds * 8);
      distance += gameSpeed * dt;
      score = Math.floor(distance / 18);
      scoreEl.textContent = String(score).padStart(5, "0");

      dino.vy += 2450 * dt;
      dino.y += dino.vy * dt;
      dino.legPhase += dt * 14;

      if (dino.y >= groundY - dino.h) {
        dino.y = groundY - dino.h;
        dino.vy = 0;
        dino.grounded = true;
      }

      for (const cloud of clouds) {
        cloud.x -= cloud.speed * dt;
        if (cloud.x < -120) {
          cloud.x = W + 80;
          cloud.y = 80 + Math.random() * (H * 0.28);
        }
      }

      if (!gift) {
        nextObstacleAt -= dt;
        if (nextObstacleAt <= 0 && seconds < CONFIG.giftAppearsAfterSeconds - 1.2) {
          spawnObstacle();
          nextObstacleAt = 1.1 + Math.random() * 1.5;
        }

        if (seconds >= CONFIG.giftAppearsAfterSeconds) {
          obstacles = [];
          spawnGift();
        }
      }

      for (const o of obstacles) o.x -= gameSpeed * dt;
      obstacles = obstacles.filter(o => o.x + o.w > -20);

      if (gift) {
        gift.x -= gameSpeed * dt;

        if (intersects(dino, gift, 5)) {
          revealSurprise();
          return;
        }

        if (gift.x + gift.w < 0) {
          gift.x = W + 100;
        }
      }
    }

    function drawCloud(cloud) {
      const x = cloud.x;
      const y = cloud.y;
      const s = cloud.size;
      ctx.save();
      ctx.fillStyle = "rgba(80,80,80,.10)";
      ctx.beginPath();
      ctx.arc(x, y, 20*s, 0, Math.PI*2);
      ctx.arc(x + 24*s, y - 10*s, 25*s, 0, Math.PI*2);
      ctx.arc(x + 50*s, y, 20*s, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawGround() {
      ctx.save();
      ctx.strokeStyle = "#5d5d5d";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, groundY + 1);
      ctx.lineTo(W, groundY + 1);
      ctx.stroke();

      ctx.fillStyle = "rgba(83,83,83,.45)";
      for (let i = -40; i < W + 60; i += 32) {
        const offset = (distance * 0.45) % 32;
        ctx.fillRect(i - offset, groundY + 11 + (i % 3), 13, 2);
      }
      ctx.restore();
    }

    function drawDino() {
      const x = dino.x;
      const y = dino.y;
      const body = "#535353";

      ctx.save();
      ctx.fillStyle = body;

      ctx.beginPath();
      ctx.moveTo(x + 5, y + 28);
      ctx.lineTo(x - 25, y + 12);
      ctx.lineTo(x + 10, y + 42);
      ctx.closePath();
      ctx.fill();

      ctx.fillRect(x + 5, y + 18, 34, 29);
      ctx.fillRect(x + 26, y + 5, 18, 31);
      ctx.fillRect(x + 34, y, 30, 22);
      ctx.fillRect(x + 54, y + 15, 14, 7);
      ctx.fillRect(x + 31, y + 31, 16, 5);
      ctx.fillRect(x + 43, y + 34, 4, 8);

      ctx.fillStyle = "#f7f7f7";
      ctx.fillRect(x + 53, y + 5, 4, 4);

      ctx.fillStyle = body;
      const legSwing = dino.grounded ? Math.sin(dino.legPhase) : 0;
      const leftDrop = legSwing > 0 ? 9 : 15;
      const rightDrop = legSwing > 0 ? 15 : 9;

      ctx.fillRect(x + 11, y + 42, 9, leftDrop);
      ctx.fillRect(x + 11, y + 42 + leftDrop - 4, 15, 5);
      ctx.fillRect(x + 30, y + 42, 9, rightDrop);
      ctx.fillRect(x + 30, y + 42 + rightDrop - 4, 15, 5);

      ctx.restore();
    }

    function drawObstacle(o) {
      ctx.save();
      ctx.fillStyle = "#5a5a5a";
      if (o.type === "cactus") {
        ctx.fillRect(o.x + 8, o.y, 12, o.h);
        ctx.fillRect(o.x, o.y + 22, 10, 10);
        ctx.fillRect(o.x, o.y + 22, 8, 24);
        ctx.fillRect(o.x + 19, o.y + 13, 9, 10);
        ctx.fillRect(o.x + 22, o.y + 13, 7, 23);
      } else {
        ctx.beginPath();
        ctx.moveTo(o.x, o.y + o.h);
        ctx.lineTo(o.x + 7, o.y + 15);
        ctx.lineTo(o.x + 20, o.y + 5);
        ctx.lineTo(o.x + o.w - 5, o.y + 16);
        ctx.lineTo(o.x + o.w, o.y + o.h);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawGift() {
      if (!gift) return;
      const { x, y, w, h } = gift;

      ctx.save();
      ctx.translate(x, y);

      const pulse = 0.5 + Math.sin(performance.now() / 180) * 0.2;
      ctx.shadowColor = `rgba(255, 93, 143, ${pulse})`;
      ctx.shadowBlur = 24;

      ctx.fillStyle = "#ff5d8f";
      ctx.fillRect(3, 13, w - 6, h - 13);

      ctx.fillStyle = "#ffc857";
      ctx.fillRect(w/2 - 6, 13, 12, h - 13);
      ctx.fillRect(0, 8, w, 12);

      ctx.beginPath();
      ctx.ellipse(w/2 - 11, 5, 12, 7, -0.45, 0, Math.PI*2);
      ctx.ellipse(w/2 + 11, 5, 12, 7, 0.45, 0, Math.PI*2);
      ctx.fill();

      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);

      const sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0, "#fcfcfc");
      sky.addColorStop(1, "#f3f3f3");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      for (const cloud of clouds) drawCloud(cloud);
      drawGround();
      for (const o of obstacles) drawObstacle(o);
      drawGift();
      drawDino();
    }

    function loop(now) {
      if (!running || revealed) return;
      const dt = Math.min((now - lastTime) / 1000, 0.035);
      lastTime = now;
      update(dt, now);
      draw();
      requestAnimationFrame(loop);
    }

    function revealSurprise() {
      revealed = true;
      running = false;
      overlay.classList.add("show");
      overlay.setAttribute("aria-hidden", "false");
      burstConfetti();
      setTimeout(() => {
        video.play().catch(() => {});
      }, 600);
    }

    function burstConfetti() {
      destroyConfetti();
      const colors = ["#ff5d8f", "#ffc857", "#6c63ff", "#51d88a", "#ffffff", "#ff8a5b"];

      for (let i = 0; i < 150; i++) {
        const piece = document.createElement("span");
        piece.className = "confetti-piece";
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.width = `${6 + Math.random() * 8}px`;
        piece.style.height = `${9 + Math.random() * 14}px`;
        piece.style.opacity = `${0.65 + Math.random() * 0.35}`;
        piece.style.setProperty("--drift", `${-140 + Math.random() * 280}px`);
        piece.style.setProperty("--spin", `${540 + Math.random() * 1080}deg`);
        piece.style.animationDuration = `${3 + Math.random() * 4}s`;
        piece.style.animationDelay = `${Math.random() * 1.5}s`;
        confetti.appendChild(piece);
      }
    }

    function destroyConfetti() {
      confetti.innerHTML = "";
    }

    function handleKey(event) {
      if (["Space", "ArrowUp"].includes(event.code)) {
        event.preventDefault();
        jump();
      }
    }

    window.addEventListener("keydown", handleKey);
    canvas.addEventListener("pointerdown", jump);
    jumpButton.addEventListener("click", jump);

    playAgain.addEventListener("click", () => {
      resetGame();
      startGame();
    });

    videoPicker.addEventListener("change", (event) => {
      const file = event.target.files && event.target.files[0];
      if (!file) return;
      const localUrl = URL.createObjectURL(file);
      video.src = localUrl;
      video.load();
      video.play().catch(() => {});
    });

    window.addEventListener("resize", () => {
      resize();
      createClouds();
      draw();
    });

    resize();
    createClouds();
    resetGame();
  </script>
</body>
</html>
